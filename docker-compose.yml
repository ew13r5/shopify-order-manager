version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shopify_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shopify_pass}
      POSTGRES_DB: ${POSTGRES_DB:-shopify_orders}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shopify_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    volumes:
      - ./backend:/app

  worker:
    build: ./backend
    command: >
      celery -A tasks.celery_app worker
      --pool=gevent --concurrency=100
      --loglevel=info
      --without-gossip --without-mingle --without-heartbeat
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: ./backend/.env

volumes:
  pgdata:
  redisdata:
